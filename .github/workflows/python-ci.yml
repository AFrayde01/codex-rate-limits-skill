name: Python CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest certifi

      - name: Compile script
        run: python -m py_compile codex-rate-limit-reset/scripts/read_rate_limits.py

      - name: Run tests
        run: pytest -q
